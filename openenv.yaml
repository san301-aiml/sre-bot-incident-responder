spec_version: "1"

name: "sre-bot-incident-responder"
version: "1.0.0"
description: "SRE simulation for log parsing, process management, and disk recovery."

# Entrypoint for uvicorn to run your FastAPI app
entrypoint: "app:app"
sdk: "docker"

runtime:
  port: 7860
  language: "python"

# Must match the fields in your models.py SREAction class
action_space:
  type: object
  properties:
    command:
      type: string
    thought:
      type: string

# Must match the fields in your models.py SREObservation class exactly
observation_space:
  type: object
  properties:
    terminal_output:
      type: string
    system_status:
      type: string
    current_step:
      type: integer
    echoed_message:
      type: string
    # Mandatory fields to pass openenv validate and ensure SDK parsing
    reward:
      type: number
    done:
      type: boolean

# Reward is mapped to a float for RL training
reward_model:
  type: float
  range: [0.0, 1.0]

tasks:
  - id: "easy"
    name: "Log Analysis"
    description: "Identify the critical error code in the system logs."
    difficulty: "easy"
    goal: "Extract the string 'CRITICAL_ERROR_505' from the logs."

  - id: "medium"
    name: "Process Management"
    description: "Terminate the high-CPU process (PID 405) to restore stability."
    difficulty: "medium"
    goal: "Kill process with PID 405."

  - id: "hard"
    name: "Disk Recovery"
    description: "Locate and remove large log files to resolve disk exhaustion."
    difficulty: "hard"
    goal: "Truncate or remove log files to free up at least 40GB."
